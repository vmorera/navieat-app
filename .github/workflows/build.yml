name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug

permissions:
  contents: write   # needed to create releases when a v* tag is pushed

jobs:
  build:
    name: Assemble ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest

    # Promote secrets to job-level env so they can be referenced from `if:`
    # expressions on steps (where the `secrets` context is not available).
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # Generate the wrapper jar on the fly so we don't have to commit a binary.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # If a release keystore is provided as repo secrets, materialise it on disk.
      - name: Decode release keystore
        if: ${{ env.BUILD_TYPE == 'release' && env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
          cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
          storeFile=release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Assemble APK
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate APKs
        id: apks
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -n1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: navieat-${{ env.BUILD_TYPE }}-${{ github.sha }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      # When a tag like v0.1.0 is pushed, also publish a GitHub Release.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
